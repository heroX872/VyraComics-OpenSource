<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>VyraComics</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo-container" onclick="navTo('inicio')">
    <img src="images/logovyracomics.png" alt="VyraComics">
  </div>
</header>

<div class="toast-container" id="toast-container"></div>

<div id="inicio" class="screen active">
  <div class="hero-strip">
    <h1>LEIA.<br><em>SINTA.</em><br>VIVA.</h1>
    <p>As melhores HQs do Brasil em um só lugar</p>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>

    <input
      type="search"
      id="search-input"
      placeholder="Buscar HQs..."
      oninput="filterHome(this.value)"
    >

    <button class="search-clear" onclick="clearSearch()">✕</button>
  </div>

  <div class="section-title">
    🔥 Bombando
    <span class="tag">HOT</span>
  </div>

  <div id="home-list" class="hq-grid"></div>
</div>

<div id="categorias" class="screen">
  <div class="section-title">📋 Categorias</div>

  <div class="cat-grid">
    <div class="cat-item"><span>⚔️ Ação</span></div>
    <div class="cat-item"><span>🌎 Aventura</span></div>
    <div class="cat-item"><span>😂 Comédia</span></div>
    <div class="cat-item"><span>🎭 Drama</span></div>
  </div>
</div>

<div id="estudio" class="screen">
  <div class="section-title">🛠️ Estúdio</div>

  <div class="box-studio">
    <div class="box-title">🚀 Nova Obra</div>

    <input type="text" id="st-name" placeholder="Título da HQ">

    <label class="input-label">Gênero:</label>

    <select id="st-genre">
      <option value="">Selecione</option>
      <option value="acao">⚔️ Ação</option>
      <option value="aventura">🌎 Aventura</option>
      <option value="comedia">😂 Comédia</option>
      <option value="drama">🎭 Drama</option>
    </select>

    <label class="input-label">Capa:</label>

    <input type="file" id="st-cover-file" accept="image/*">

    <button
      class="btn-primary"
      id="btn-create"
      onclick="createWork()"
    >
      + Criar Obra
    </button>
  </div>

  <div class="section-title">Suas HQs</div>

  <div id="studio-list" class="hq-grid"></div>
</div>

<div id="perfil" class="screen">

  <div class="p-banner" id="view-banner"></div>

  <div class="p-avatar" id="view-avatar"></div>

  <div style="text-align:center;margin-bottom:20px;">
    <div class="profile-name" id="view-name">Carregando...</div>
    <div class="profile-handle" id="view-user">@user</div>
  </div>

  <div class="section-title">Minhas Obras</div>

  <div id="perfil-list" class="hq-grid"></div>
</div>

<nav class="bottom-nav">

  <div class="nav-item active" onclick="navTo('inicio')">
    <span class="nav-icon">🏠</span>
    <span>Início</span>
  </div>

  <div class="nav-item" onclick="navTo('categorias')">
    <span class="nav-icon">📋</span>
    <span>Explorar</span>
  </div>

  <div class="nav-item" onclick="navTo('estudio')">
    <span class="nav-icon">🛠️</span>
    <span>Estúdio</span>
  </div>

  <div class="nav-item" onclick="navTo('perfil')">
    <span class="nav-icon">👤</span>
    <span>Perfil</span>
  </div>

</nav>

<script type="module" src="app.js"></script>

</body>
</html>
